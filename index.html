<!DOCTYPE html>
<html>
<head>
<title>Smart Waste Segregation</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Smart Waste Segregation System</h1>

<div class="card-container">

<div class="card">
<h2>Upload Waste</h2>
<input type="file" id="imageUpload">
</div>

<div class="card">
<h2>Detect Waste</h2>
<button onclick="detectWaste()">Detect</button>
</div>

<div class="card">
<h2>Result</h2>
<p id="result">No waste detected</p>
</div>

<div class="card">
<h2>Score</h2>
<p id="score">0</p>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
